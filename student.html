<html>
<head>
<title>Student Admission Form</title>
</head>

<body>
<form>

<table>

<tr>
<td>Student Name</td>
<td><input type="text" placeholder="Enter Name"></td>
</tr>

<tr>
<td>Father's Name</td>
<td><input type="text" placeholder="Enter Father's Name"></td>
</tr>

<tr>
<td>Mother's Name</td>
<td><input type="text" placeholder="Enter Mother's Name"></td>
</tr>

<tr>
<td>DoB</td>
<td><input type="date"></td>
</tr>

<tr>
<td>Gender</td>
<td>
<input type="radio" name="gy"> Male
<input type="radio" name="gy"> Female
</td>
</tr>

<tr>
<td>Email</td>
<td><input type="email" placeholder="Enter Email"></td>
</tr>

<tr>
<td>Mobile Number</td>
<td><input type="number" placeholder="Enter Mobile Number"></td>
</tr>

<tr>
<td>Address</td>
<td><textarea></textarea></td>
</tr>

<tr>
<td>Course</td>
<td>
<select>
<option value="">select department</option>
<option>B.Tech</option>
<option>BCA</option>
<option>BBA</option>
<option>MCA</option>
</select>
</td>
</tr>

<tr>
<td>Upload Photo</td>
<td><input type="file"></td>
</tr>

<tr>
<td>
<input type="submit" value="Submit">
<input type="reset" value="Reset">
</td>
</tr>

</table>

</form>

</body>
</html>
